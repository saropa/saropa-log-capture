# Auto-merge Dependabot PRs once CI passes, so green dependency bumps never
# accumulate into a stale, lockfile-conflicting backlog (the failure mode this
# repo hit: 11 open bumps, the 4 oldest gone CONFLICTING from base drift).
#
# Only patch + minor are auto-merged. Major bumps (semver-major) fall through
# and stay open for manual review — a v9->v10 API change must not slip in
# unattended.
#
# `gh pr merge --auto` enqueues the merge; GitHub completes it only after the
# required `build` check passes. Prerequisites (one-time, in repo Settings):
#   1. General -> "Allow auto-merge" enabled.
#   2. Branch protection on `main` requiring the CI `build` check — otherwise
#      --auto has no gate and merges immediately.
name: Dependabot auto-merge

on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Only act on Dependabot's own PRs.
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch update metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch and minor bumps
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor' }}
        run: gh pr merge --auto --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
