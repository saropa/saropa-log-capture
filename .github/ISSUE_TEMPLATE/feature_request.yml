name: Feature request
description: Suggest an improvement or new capability
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Check [CONTRIBUTING.md](https://github.com/saropa/saropa-log-capture/blob/main/CONTRIBUTING.md) for design principles (single-purpose tool, progressive disclosure).
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow is painful or impossible today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should the extension do instead?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
