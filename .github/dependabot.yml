# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      # Group minor and patch updates for dev dependencies into single PR
      dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Batch production minor + patch bumps into one PR; majors stay
      # individual so a breaking-change review is never auto-batched away.
      # Minor was previously ungrouped, so every prod minor (undici, ws, qs…)
      # opened its own PR and the backlog drifted into lockfile conflicts.
      prod-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
