  <!-- 4 level dots in the title bar -->
  <circle cx="7" cy="5" r="1.3" fill="currentColor"/>
  <circle cx="10.5" cy="5" r="1.3" fill="currentColor"/>
  <circle cx="14" cy="5" r="1.3" fill="currentColor"/>
  <circle cx="17.5" cy="5" r="1.3" fill="currentColor"/>

  <!-- Log lines -->
  <line x1="6" y1="11.5" x2="18" y2="11.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="14.5" x2="14" y2="14.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="6" y1="17.5" x2="16" y2="17.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
